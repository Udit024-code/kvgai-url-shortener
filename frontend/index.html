<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePath AI - Smart Link Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>SecurePath AI Pipeline</h1>
    <p class="subtitle">Next-Gen URL Infrastructure & Automated Cyber-Threat Mitigation Matrix</p>

    <div class="form-group">
        <input type="text" id="urlInput" placeholder="Paste your destination link here (e.g., https://example.com)...">
        <button id="shortenBtn">Shorten & Scan</button>
    </div>

    <div class="dashboard-header">
        <h2>Threat Mitigation Dashboard</h2>
        <div class="action-buttons">
            <button id="refreshBtn">Refresh Data</button>
            <button id="clearBtn">Clear Dashboard</button>  
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Original Destination Link</th>
                <th>Secure Short URL</th>
                <th>Clicks</th>
                <th>Safety Status</th>
                <th>AI Threat Analysis Summary</th>
            </tr>
        </thead>
        <tbody id="analyticsTableBody">
            </tbody>
    </table>
</div>

<script src="app.js"></script>
</body>
</html>
